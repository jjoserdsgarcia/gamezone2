{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - GameZone</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            background-color: #1b2838;
            color: #c7d5e0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #171a21;
        }

        .navbar-brand {
            color: #66c0f4 !important;
            font-weight: bold;
        }

        .login-container {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: #2a475e;
            border: none;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }

        .form-control {
            background-color: #1b2838;
            border: 1px solid #66c0f4;
            color: #fff;
        }

        .form-control:focus {
            background-color: #1b2838;
            color: #fff;
            border-color: #66c0f4;
            box-shadow: none;
        }

        .btn-steam {
            background-color: #66c0f4;
            color: #000;
            border: none;
        }

        .btn-steam:hover {
            background-color: #417a9b;
            color: #fff;
        }

        a {
            color: #66c0f4;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #171a21;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <img src="{% static 'core/img/logo.png'%}" alt="GameZone Logo" style="width: 200px;">
            <a class="navbar-brand" href="#">GameZone</a>
        </div>
    </nav>

    <!-- Login -->
    <div class="login-container">
        <div class="login-card shadow">

            <div class="text-center mb-4">
                <img src="{% static 'core/img/logo2.png' %}" alt="Logo" style="width: 200px;">
                <h3 class="mt-3">Entrar na conta</h3>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Usuário ou Email</label>
                    <input type="text" name="username" class="form-control" placeholder="Digite seu usuário ou email"
                        required>
                </div>

                <div class="mb-3">

                </div>

                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
                {% if error %}
                <div class="alert alert-danger" role="alert" style="margin-top: 15px;">
                    {{ error }}
                </div>
                {% endif %}

                <div class="d-grid">
                    <button type="submit" class="btn btn-steam" href="{% url 'paginaloja' %}">Entrar</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <small>Não tem uma conta? <a href="{% url 'paginacriarconta' %}">Criar conta</a></small>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center p-3">
        <p>© 2026 GameZone - Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
