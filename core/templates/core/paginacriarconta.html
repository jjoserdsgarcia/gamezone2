{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar Conta - GameZone</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #1b2838;
            color: #c7d5e0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #171a21;
        }

        .navbar-brand {
            color: #66c0f4 !important;
            font-weight: bold;
        }

        .register-container {
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            background-color: #2a475e;
            border: none;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
        }

        .form-control {
            background-color: #1b2838;
            border: 1px solid #66c0f4;
            color: #fff;
        }

        .form-control:focus {
            background-color: #1b2838;
            color: #fff;
            border-color: #66c0f4;
            box-shadow: none;
        }

        .btn-steam {
            background-color: #66c0f4;
            color: #000;
            border: none;
        }

        .btn-steam:hover {
            background-color: #417a9b;
            color: #fff;
        }

        a {
            color: #66c0f4;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #171a21;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <img src="{% static 'core/img/logo.png'%}" alt="GameZone Logo" style="width: 200px;">
            <a class="navbar-brand" href="#">GameZone</a>

            <div class="ms-auto">
                <a href="{% url 'paginalogin' %}" class="nav-link text-light">Login</a>
            </div>
        </div>
    </nav>

    <!-- Cadastro -->
    <div class="register-container">
        <div class="register-card shadow">

            <div class="text-center mb-4">
                <img src="{% static 'core/img/logo2.png' %}" alt="Logo" style="width: 200px;">
                <h3 class="mt-3">Criar Conta</h3>
            </div>

            <form method="POST">
                {% csrf_token %}


                <div class="mb-3">
                    <label class="form-label">Nome de usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Escolha um usuário" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="Crie uma senha" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-steam">Criar Conta</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <small>Já tem uma conta? <a href="{% url 'paginalogin' %}">Entrar</a></small>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center p-3">
        <p>© 2026 GameZone - Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
